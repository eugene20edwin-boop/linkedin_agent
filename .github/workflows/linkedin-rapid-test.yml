name: LinkedIn Rapid Test

on:
  workflow_dispatch:
    inputs:
      count:
        description: "Number of test posts to publish"
        required: false
        default: "3"
        type: string
      interval_seconds:
        description: "Seconds to wait between posts"
        required: false
        default: "180"
        type: string
      topic:
        description: "Topic override"
        required: false
        default: "Google Ads latest news for marketers::focus on recent Google Ads platform updates, AI ad features, Performance Max, policy changes, and practical advertiser takeaways; avoid unverifiable claims"
        type: string

jobs:
  rapid-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Publish rapid test posts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-2.5-flash-lite
          GEMINI_MODEL_FALLBACKS: gemini-flash-lite-latest,gemini-2.5-flash
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_ORGANIZATION_ID: ${{ secrets.LINKEDIN_ORGANIZATION_ID }}
          LINKEDIN_AUTHOR_URN: ${{ secrets.LINKEDIN_AUTHOR_URN }}
          LINKEDIN_PERSON_ID: ${{ secrets.LINKEDIN_PERSON_ID }}
          LINKEDIN_VERSION: "202405"
          COUNT: ${{ github.event.inputs.count }}
          INTERVAL_SECONDS: ${{ github.event.inputs.interval_seconds }}
          BASE_TOPIC: ${{ github.event.inputs.topic }}
        run: |
          set -euo pipefail

          for i in $(seq 1 "$COUNT"); do
            echo "Publishing rapid test post $i of $COUNT"
            TOPIC="$BASE_TOPIC; make this version distinct from the other rapid test posts; test run $i of $COUNT" npm run post

            if [ "$i" -lt "$COUNT" ]; then
              echo "Waiting $INTERVAL_SECONDS seconds before next post"
              sleep "$INTERVAL_SECONDS"
            fi
          done
